<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | La Bella Salon & Body Spa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Instrument+Serif:ital@0;1&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --bg-dark: #121212;
            --primary-gold: #ffffff;
            --gold-hover: #cccccc;
            --text-light: #F8F9FA;
            --text-muted: #B0B0B0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-muted);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Instrument Serif', serif;
            color: var(--text-light);
            font-weight: 400;
        }
        .italic-accent { font-style: italic; }
        a { text-decoration: none; color: inherit; transition: color 0.3s ease; }

        .gold-shine {
            background: linear-gradient(to right, #ffffff 20%, #cccccc 40%, #cccccc 60%, #ffffff 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            text-fill-color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        h1.gold-shine { animation: shine 4s linear infinite; }
        .reveal.active .gold-shine:not(h1), .reveal.active.gold-shine:not(h1) { animation: shine 3s linear forwards; }
        .gold-shine:not(h1):hover { animation: shine 2s linear forwards; }
        @keyframes shine { to { background-position: 200% center; } }
        @media (prefers-reduced-motion: reduce) {
            .gold-shine, h1.gold-shine, .reveal.active .gold-shine, .reveal.active.gold-shine, .gold-shine:hover { animation: none !important; }
            .reveal { transition: none !important; opacity: 1 !important; transform: none !important; }
        }

        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid var(--primary-gold); outline-offset: 4px; }
        .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; z-index: 1001; }
        .mobile-menu-btn span { display: block; width: 25px; height: 2px; background-color: var(--primary-gold); margin: 5px 0; transition: all 0.3s ease; }
        .mobile-menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .mobile-menu-btn.active span:nth-child(2) { opacity: 0; }
        .mobile-menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); padding: 0.8rem 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-container { display: flex; flex-direction: column; align-items: center; text-decoration: none; transition: transform 0.3s ease; }
        .logo-container:hover { transform: scale(1.05); }
        .logo-img {
            height: 100px; width: auto; max-width: 100%;
            object-fit: contain; display: block; transition: transform 0.3s ease;
            padding: 5px;
        }
        .logo-container:hover .text-logo { transform: scale(1.05); }
        .text-logo { display: flex; flex-direction: column; align-items: center; padding: 5px; transition: transform 0.3s ease; }
        .logo-main {
            font-family: 'Alex Brush', cursive; font-size: 4.2rem; line-height: 1.2;
            font-weight: 400; margin-bottom: -5px; padding: 10px 20px; display: inline-block;
            color: #ffffff; text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }
        .logo-sub { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; color: #ffffff; text-shadow: none; }
        nav { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--text-light); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a:hover { color: var(--primary-gold); }
        .btn {
            display: inline-block; padding: 0.8rem 1.5rem; background-color: var(--primary-gold);
            color: #000000; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            border: none; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; font-family: 'Montserrat', sans-serif;
        }
        .btn:hover { background-color: var(--gold-hover); color: #000000; transform: scale(1.05); }

        #careers {
            min-height: 100vh;
            padding: 10rem 5% 5rem;
            background: radial-gradient(circle at 50% 30%, #2a2415 0%, #121212 70%);
            position: relative;
            overflow: hidden;
        }
        #careers::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: grayscale(100%) contrast(1.2);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
            z-index: 1; pointer-events: none;
        }
        .careers-container {
            position: relative; z-index: 2; max-width: 800px; margin: 0 auto;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 3rem; border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .section-title { font-size: 3rem; margin-bottom: 1rem; text-align: center; color: var(--primary-gold); }
        .careers-intro { text-align: center; margin-bottom: 3rem; font-size: 1.1rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-control {
            width: 100%; padding: 1rem; background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border); color: var(--text-light);
            font-family: 'Montserrat', sans-serif; font-size: 1rem; border-radius: 16px;
            transition: border-color 0.3s ease;
        }
        .form-control:focus { outline: none; border-color: var(--primary-gold); }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.5); }
        select.form-control { appearance: none; }
        select.form-control option { background-color: var(--bg-dark); color: var(--text-light); }
        textarea.form-control { resize: vertical; min-height: 120px; }
        
        .file-upload {
            border: 1px dashed var(--glass-border); padding: 2rem; text-align: center;
            border-radius: 16px; background: rgba(0,0,0,0.3); transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-upload:hover { border-color: var(--primary-gold); background: rgba(255, 255, 255, 0.05); }
        .file-upload input[type="file"] { display: none; }
        .file-upload label { color: var(--primary-gold); cursor: pointer; font-weight: 500; }
        
        .btn-submit { width: 100%; margin-top: 1rem; }
        .success-message { text-align: center; font-size: 1.5rem; color: var(--primary-gold); font-family: 'Instrument Serif', serif; font-style: italic; padding: 2rem 0; }

        .social-icons { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.5rem; }
        .social-icon { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--glass-border); color: var(--text-light); text-decoration: none; transition: all 0.3s ease; }
        .social-icon:hover { background: var(--primary-gold); color: var(--bg-dark); transform: translateY(-3px); border-color: var(--primary-gold); }
        .social-icon svg { width: 18px; height: 18px; fill: currentColor; }
        footer { background-color: #0a0a0a; padding: 2rem 5%; border-top: 1px solid var(--glass-border); text-align: center; }

        .header-book-mobile { display: none; }
        @media (max-width: 768px) {
            header { padding: 0.5rem 5%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; }
            .mobile-menu-btn { display: block; order: -1; justify-self: start; }
            .logo-container { justify-self: center; }
            .header-book-mobile { display: block; justify-self: end; color: var(--primary-gold); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; font-weight: 600; }
            .logo-img { height: 50px; }
            .footer-logo-img { height: 120px; }
            .logo-main { font-size: 2rem; }
            .logo-sub { font-size: 0.4rem; letter-spacing: 1.5px; }
            .section-title { font-size: 2rem; }
            .careers-intro { font-size: 1rem; }
            .mobile-menu-btn { display: block; }
            nav.nav-menu { position: fixed; top: 0; right: -100%; width: 80%; max-width: 300px; height: 100vh; background: var(--bg-dark); border-left: 1px solid var(--glass-border); flex-direction: column; justify-content: center; padding: 2rem; transition: right 0.3s ease; z-index: 1000; }
            nav.nav-menu.active { right: 0; }
            .nav-links { flex-direction: column; align-items: center; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo-container">
            <img src="/logolive.png" alt="La Bella Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="text-logo" style="display: none;">
                <span class="logo-main">La Bella</span>
                <span class="logo-sub">HAIR &bull; BEAUTY &bull; SPA &bull; SALON</span>
            </div>
        </a>
        <button class="mobile-menu-btn" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a href="/index.html#booking" class="header-book-mobile">Book</a>
        <nav class="nav-menu">
            <ul class="nav-links">
                <li><a href="/index.html">Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <section id="careers">
        <div class="overlay"></div>
        <div class="careers-container" id="careers-form-container">
            <h1 class="section-title gold-shine">Join Our <span class="italic-accent">Team</span></h1>
            <p class="careers-intro">We are always looking for passionate and talented professionals to join La Bella Salon & Body Spa. Fill out the form below to apply.</p>
            
            <form id="careers-form">
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" class="form-control" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="tel" class="form-control" placeholder="Phone Number" required>
                </div>
                <div class="form-group">
                    <select class="form-control" required>
                        <option value="" disabled selected>Position Applied For</option>
                        <option value="Hair Stylist">Senior Hair Stylist</option>
                        <option value="Makeup Artist">Makeup Artist</option>
                        <option value="Spa Therapist">Spa Therapist / Masseuse</option>
                        <option value="Nail Technician">Nail Technician</option>
                        <option value="Salon Manager">Salon Manager</option>
                        <option value="Receptionist">Receptionist</option>
                    </select>
                </div>
                <div class="form-group">
                    <textarea class="form-control" placeholder="Tell us about your experience..." required></textarea>
                </div>
                <div class="form-group">
                    <div class="file-upload" onclick="document.getElementById('cv-upload').click()">
                        <input type="file" id="cv-upload" accept=".pdf,.doc,.docx" required onchange="document.getElementById('file-name').textContent = this.files[0].name">
                        <label>Click to Upload CV (PDF, DOCX)</label>
                        <p id="file-name" style="margin-top: 10px; font-size: 0.9rem; color: var(--text-light);"></p>
                    </div>
                </div>
                <button type="submit" class="btn btn-submit">Submit Application</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="social-icons">
            <a href="#" target="_blank" class="social-icon" aria-label="Facebook">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
            </a>
            <a href="#" target="_blank" class="social-icon" aria-label="Instagram">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="#" target="_blank" class="social-icon" aria-label="LinkedIn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M4.98 3.5c0 1.381-1.11 2.5-2.48 2.5s-2.48-1.119-2.48-2.5c0-1.38 1.11-2.5 2.48-2.5s2.48 1.12 2.48 2.5zm.02 4.5h-5v16h5v-16zm7.982 0h-4.968v16h4.969v-8.399c0-4.67 6.029-5.052 6.029 0v8.399h4.988v-10.131c0-7.88-8.922-7.593-11.018-3.714v-2.155z"/></svg>
            </a>
        </div>
        <p>Copyright &copy; 2026 La Bella Salon & Body Spa. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.querySelector('.mobile-menu-btn');
            const navMenu = document.querySelector('.nav-menu');
            if (mobileBtn && navMenu) {
                mobileBtn.addEventListener('click', () => { mobileBtn.classList.toggle('active'); navMenu.classList.toggle('active'); });
                document.querySelectorAll('.nav-links a, .nav-menu .btn').forEach(link => {
                    link.addEventListener('click', () => { mobileBtn.classList.remove('active'); navMenu.classList.remove('active'); });
                });
            }

            const form = document.getElementById('careers-form');
            const formContainer = document.getElementById('careers-form-container');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                let isValid = true;
                const inputs = form.querySelectorAll('input, select, textarea');
                inputs.forEach(input => {
                    if (!input.value) isValid = false;
                });

                if (isValid) {
                    form.style.display = 'none';
                    const successMsg = document.createElement('div');
                    successMsg.className = 'success-message';
                    successMsg.innerHTML = `
                        <p class="gold-shine" style="margin-bottom: 1.5rem;">Thank you for applying! Your application has been received and our team will contact you soon.</p>
                        <button id="apply-another-btn" class="btn btn-outline" style="color: var(--primary-gold); border: 2px solid var(--primary-gold); background: transparent;">Submit Another Application</button>
                    `;
                    formContainer.appendChild(successMsg);
                    
                    document.getElementById('apply-another-btn').addEventListener('click', () => {
                        form.reset();
                        document.getElementById('file-name').textContent = '';
                        successMsg.remove();
                        form.style.display = 'block';
                    });
                }
            });
        });
    </script>
</body>
</html>
